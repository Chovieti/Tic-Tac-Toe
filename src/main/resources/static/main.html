<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Главное меню</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    .menu a { display: inline-block; margin: 10px; padding: 15px 25px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
    .menu a:hover { background: #0056b3; }
    .logout { background: #dc3545; }
  </style>
  <script src="/auth.js"></script>
</head>
<body>
<h1>Главное меню</h1>
<div class="menu">
  <a href="/user.html">Найти пользователя</a>
  <a href="/games.html">Доступные игры</a>
  <a href="/create-game.html">Создать игру</a>
  <a href="#" id="logout" class="logout">Выйти</a>
</div>

<script>
  if (!isAuthenticated()) window.location.href = '/login.html';
  document.getElementById('logout').addEventListener('click', (e) => {
      e.preventDefault();
      logout();
  });
</script>
</body>
</html>
