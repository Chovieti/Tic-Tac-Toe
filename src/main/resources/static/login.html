<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход / Регистрация</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
    input, button { padding: 10px; margin: 5px; font-size: 16px; }
    .error { color: red; margin-top: 10px; }
  </style>
  <script src="/auth.js"></script>
</head>
<body>
<h1>Добро пожаловать в Крестики-нолики</h1>
<div>
  <input type="text" id="login" placeholder="Логин" /><br/>
  <input type="password" id="password" placeholder="Пароль" /><br/>
  <button id="loginBtn">Войти</button>
  <button id="registerBtn">Зарегистрироваться</button>
</div>
<div id="message" class="error"></div>

<script>
  const loginInput = document.getElementById('login');
  const passwordInput = document.getElementById('password');
  const messageDiv = document.getElementById('message');

  async function doAuth(login, password, isRegister) {
      if (isRegister) {
          const regResp = await fetch('/auth/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ login, password })
          });
          if (!regResp.ok) {
              const err = await regResp.json().catch(() => ({}));
              throw new Error(err.message || 'Ошибка регистрации');
          }
      }

      const authResp = await fetch('/auth/authorization', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login, password })
      });
      if (!authResp.ok) {
          const err = await authResp.json().catch(() => ({}));
          throw new Error(err.message || 'Ошибка аутентификации');
      }
      const { accessToken, refreshToken } = await authResp.json();
      saveTokens(accessToken, refreshToken);
      saveUserLogin(login);

      // Получаем userId через /auth/me
      const userInfo = await fetchCurrentUser();
      saveUserId(userInfo.userId);

      window.location.href = '/main.html';
  }

  document.getElementById('loginBtn').addEventListener('click', async () => {
      const login = loginInput.value.trim();
      const password = passwordInput.value.trim();
      if (!login || !password) {
          messageDiv.textContent = 'Заполните оба поля';
          return;
      }
      try {
          await doAuth(login, password, false);
      } catch (e) {
          messageDiv.textContent = e.message;
      }
  });

  document.getElementById('registerBtn').addEventListener('click', async () => {
      const login = loginInput.value.trim();
      const password = passwordInput.value.trim();
      if (!login || !password) {
          messageDiv.textContent = 'Заполните оба поля';
          return;
      }
      try {
          await doAuth(login, password, true);
      } catch (e) {
          messageDiv.textContent = e.message;
      }
  });
</script>
</body>
</html>
