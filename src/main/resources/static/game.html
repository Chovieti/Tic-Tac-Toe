<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Крестики-нолики — игра</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 30px; }
    .game-container { display: inline-block; }
    table { border-collapse: collapse; margin: 20px auto; }
    td { width: 80px; height: 80px; border: 2px solid #333; text-align: center; vertical-align: middle; font-size: 40px; font-weight: bold; cursor: pointer; }
    td.X { color: #f00; }
    td.O { color: #00f; }
    button { padding: 10px 20px; font-size: 16px; margin: 10px; }
    .status { margin: 20px; font-size: 18px; }
    .error { color: red; }
    .game-id { font-family: monospace; background: #f0f0f0; padding: 5px; border-radius: 5px; }
  </style>
  <script src="/auth.js"></script>
</head>
<body>
<h1>Крестики-нолики</h1>
<div class="game-container">
  <div>
    <button id="mainMenuBtn">На главную</button>
    <button id="refreshBtn" style="display:none;">Обновить</button>
  </div>
  <div class="status" id="status">Загрузка...</div>
  <div id="gameIdDisplay" class="game-id"></div>
  <table id="board"></table>
  <div id="message" class="error"></div>
</div>

<script>
  if (!isAuthenticated()) window.location.href = '/login.html';

  const urlParams = new URLSearchParams(window.location.search);
  const gameId = urlParams.get('id');
  if (!gameId) {
      alert('Не указан ID игры. Перенаправление на главную.');
      window.location.href = '/main.html';
  }

  let currentGame = null;
  let pollInterval = null;

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const gameIdDisplay = document.getElementById('gameIdDisplay');
  const mainMenuBtn = document.getElementById('mainMenuBtn');
  const refreshBtn = document.getElementById('refreshBtn');

  async function loadGame() {
      try {
          const response = await authFetch(`/game/${gameId}`);
          const game = await response.json();
          currentGame = game;
          renderBoard(game.field.field);
          gameIdDisplay.textContent = `ID игры: ${gameId}`;
          updateStatus(game);
          if (isGameOver(game)) {
              stopPolling();
          } else {
              startPollingIfNeeded(game);
          }
      } catch (error) {
          statusEl.innerHTML = `<span class="error">Ошибка: ${error.message}</span>`;
          stopPolling();
      }
  }

  function renderBoard(board) {
      boardEl.innerHTML = '';
      for (let i = 0; i < 3; i++) {
          const tr = document.createElement('tr');
          for (let j = 0; j < 3; j++) {
              const td = document.createElement('td');
              const cellValue = board[i][j];
              if (cellValue === 1) {
                  td.textContent = 'X';
                  td.classList.add('X');
              } else if (cellValue === 2) {
                  td.textContent = 'O';
                  td.classList.add('O');
              } else {
                  td.textContent = '';
              }
              td.dataset.row = i;
              td.dataset.col = j;
              td.addEventListener('click', onCellClick);
              tr.appendChild(td);
          }
          boardEl.appendChild(tr);
      }
  }

  function updateStatus(game) {
      const status = game.status;
      if (status === 'WIN_PLAYER_X') statusEl.textContent = 'Победили X!';
      else if (status === 'WIN_PLAYER_O') statusEl.textContent = 'Победили O!';
      else if (status === 'DRAW') statusEl.textContent = 'Ничья!';
      else if (status === 'WAITING') statusEl.textContent = 'Ожидание второго игрока...';
      else if (status === 'TURN_PLAYER_X') statusEl.textContent = 'Ход X';
      else if (status === 'TURN_PLAYER_O') statusEl.textContent = 'Ход O';
  }

  function isGameOver(game) {
      return ['WIN_PLAYER_X', 'WIN_PLAYER_O', 'DRAW'].includes(game.status);
  }

  function canUserMove(game) {
      const userId = getUserId();
      if (!userId) return false;
      const isPlayerX = game.playerXId === userId;
      const isPlayerO = game.playerOId === userId;
      if (!isPlayerX && !isPlayerO) return false;
      if (game.type === 'VS_COMPUTER') {
          return isPlayerX && game.status === 'TURN_PLAYER_X';
      } else {
          return (isPlayerX && game.status === 'TURN_PLAYER_X') || (isPlayerO && game.status === 'TURN_PLAYER_O');
      }
  }

  async function onCellClick(event) {
      if (!currentGame) return;
      if (isGameOver(currentGame)) {
          alert('Игра окончена');
          return;
      }
      if (!canUserMove(currentGame)) {
          alert('Сейчас не ваш ход');
          return;
      }
      const row = parseInt(event.target.dataset.row);
      const col = parseInt(event.target.dataset.col);
      const currentBoard = currentGame.field.field;
      if (currentBoard[row][col] !== 0) {
          alert('Клетка занята');
          return;
      }

      const newBoard = currentBoard.map(rowArr => [...rowArr]);
      const userId = getUserId();
      const isPlayerX = currentGame.playerXId === userId;
      newBoard[row][col] = isPlayerX ? 1 : 2;

      await sendMove(newBoard);
  }

  async function sendMove(board) {
      try {
          const response = await authFetch(`/game/${gameId}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ field: board })
          });
          const game = await response.json();
          currentGame = game;
          renderBoard(game.field.field);
          updateStatus(game);
          if (isGameOver(game)) {
              stopPolling();
          } else {
              startPollingIfNeeded(game);
          }
      } catch (error) {
          document.getElementById('message').textContent = error.message;
      }
  }

  function startPollingIfNeeded(game) {
      if (game.type === 'VS_PLAYER' && !isGameOver(game)) {
          if (!pollInterval) {
              pollInterval = setInterval(loadGame, 2000);
              refreshBtn.style.display = 'inline-block';
          }
      } else {
          stopPolling();
      }
  }

  function stopPolling() {
      if (pollInterval) {
          clearInterval(pollInterval);
          pollInterval = null;
          refreshBtn.style.display = 'none';
      }
  }

  mainMenuBtn.addEventListener('click', () => {
      stopPolling();
      window.location.href = '/main.html';
  });

  refreshBtn.addEventListener('click', () => {
      loadGame();
  });

  loadGame();
</script>
</body>
</html>
